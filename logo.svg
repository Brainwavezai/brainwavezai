<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#67e8f9"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0a0a1a"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#mainGrad)" stroke-width="3" opacity="0.4"/>

  <!-- Outer ring - neural network hint -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#mainGrad)" stroke-width="1.5" opacity="0.2"/>

  <!-- Brain shape - stylized, geometric -->
  <g transform="translate(256, 240)" filter="url(#glow)">
    <!-- Left hemisphere -->
    <path d="M-8,-95 C-55,-95 -95,-70 -105,-30 C-115,10 -100,45 -80,65 C-65,80 -40,95 -8,95"
          fill="none" stroke="url(#mainGrad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Left hemisphere inner fold -->
    <path d="M-8,-70 C-40,-70 -70,-50 -78,-20 C-85,10 -72,38 -55,52"
          fill="none" stroke="url(#innerGrad)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- Left hemisphere deep fold -->
    <path d="M-30,-45 C-50,-35 -58,-10 -52,15"
          fill="none" stroke="url(#innerGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Right hemisphere -->
    <path d="M8,-95 C55,-95 95,-70 105,-30 C115,10 100,45 80,65 C65,80 40,95 8,95"
          fill="none" stroke="url(#mainGrad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Right hemisphere inner fold -->
    <path d="M8,-70 C40,-70 70,-50 78,-20 C85,10 72,38 55,52"
          fill="none" stroke="url(#innerGrad)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- Right hemisphere deep fold -->
    <path d="M30,-45 C50,-35 58,-10 52,15"
          fill="none" stroke="url(#innerGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Center divide -->
    <line x1="0" y1="-95" x2="0" y2="95" stroke="url(#mainGrad)" stroke-width="2" opacity="0.3"/>

    <!-- Neural nodes -->
    <circle cx="-65" cy="-50" r="5" fill="url(#innerGrad)" filter="url(#softGlow)"/>
    <circle cx="-85" cy="-5" r="5" fill="url(#innerGrad)" filter="url(#softGlow)"/>
    <circle cx="-60" cy="40" r="5" fill="url(#innerGrad)" filter="url(#softGlow)"/>
    <circle cx="65" cy="-50" r="5" fill="url(#innerGrad)" filter="url(#softGlow)"/>
    <circle cx="85" cy="-5" r="5" fill="url(#innerGrad)" filter="url(#softGlow)"/>
    <circle cx="60" cy="40" r="5" fill="url(#innerGrad)" filter="url(#softGlow)"/>
    <circle cx="0" cy="-75" r="4" fill="url(#innerGrad)" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="6" fill="url(#innerGrad)" filter="url(#softGlow)"/>
    <circle cx="0" cy="70" r="4" fill="url(#innerGrad)" filter="url(#softGlow)"/>

    <!-- Neural connections -->
    <line x1="-65" y1="-50" x2="0" y2="0" stroke="url(#pulseGrad)" stroke-width="1.5" opacity="0.4"/>
    <line x1="-85" y1="-5" x2="0" y2="0" stroke="url(#pulseGrad)" stroke-width="1.5" opacity="0.4"/>
    <line x1="-60" y1="40" x2="0" y2="0" stroke="url(#pulseGrad)" stroke-width="1.5" opacity="0.4"/>
    <line x1="65" y1="-50" x2="0" y2="0" stroke="url(#pulseGrad)" stroke-width="1.5" opacity="0.4"/>
    <line x1="85" y1="-5" x2="0" y2="0" stroke="url(#pulseGrad)" stroke-width="1.5" opacity="0.4"/>
    <line x1="60" y1="40" x2="0" y2="0" stroke="url(#pulseGrad)" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-75" x2="0" y2="0" stroke="url(#pulseGrad)" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="70" x2="0" y2="0" stroke="url(#pulseGrad)" stroke-width="1.5" opacity="0.4"/>

    <!-- Cross-hemisphere connections -->
    <line x1="-65" y1="-50" x2="65" y2="-50" stroke="url(#pulseGrad)" stroke-width="1" opacity="0.25"/>
    <line x1="-85" y1="-5" x2="85" y2="-5" stroke="url(#pulseGrad)" stroke-width="1" opacity="0.25"/>
    <line x1="-60" y1="40" x2="60" y2="40" stroke="url(#pulseGrad)" stroke-width="1" opacity="0.25"/>
  </g>

  <!-- Brainwave / pulse line at bottom -->
  <g filter="url(#softGlow)">
    <polyline points="100,390 140,390 160,370 175,410 190,360 205,420 220,380 240,390 280,390 300,370 315,410 330,360 345,420 360,380 380,390 412,390"
              fill="none" stroke="url(#pulseGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
